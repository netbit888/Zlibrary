name = "zlibrary-api"
main = "server/api/worker.ts"
compatibility_date = "2024-07-01"

[[d1_databases]]
binding = "DB"
database_name = "zlibrary-db"
database_id = "your-database-id-here"

[[kv_namespaces]]
binding = "FILES_KV"
id = "your-kv-namespace-id-here"

[vars]
ADMIN_PASSWORD = "zlibrary"

[build]
command = "npm install"

[env.production]
vars = { ADMIN_PASSWORD = "zlibrary" }
